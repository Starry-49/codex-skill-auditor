name: test

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Python tests
        run: python -m unittest -v
      - name: Check Node CLI syntax
        run: node --check bin/codex-skill-audit.js
      - name: Dry-run install command
        run: node bin/codex-skill-audit.js install --dest-root /tmp/codex-skill-auditor-test

